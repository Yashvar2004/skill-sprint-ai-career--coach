<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Skill Sprint — AI Career Coach</title>
<style>
:root{--bg:#0a0a1a;--card:#12122a;--border:rgba(255,255,255,0.06);--green:#00d4aa;--blue:#4361ee;--red:#ef4444;--text:#a0a0b0;--white:#e0e0f0;--accent:linear-gradient(135deg,#4361ee,#7209b7)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(67,97,238,0.03)1px,transparent 1px);background-size:30px 30px}
.grad{background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{font-weight:600;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff;padding:12px 24px}.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 30px rgba(67,97,238,.25)}
.btn-d{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;padding:12px 24px}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 18px}.btn-o:hover{border-color:var(--blue)}
.btn-sm{padding:6px 14px;font-size:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card h3{color:var(--white);font-size:15px;margin-bottom:12px}
.input{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--white);font-size:14px;outline:none;margin-bottom:12px}.input:focus{border-color:var(--blue)}.input::placeholder{color:#444}
select.input{cursor:pointer}
label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase}.b-ok{background:rgba(0,212,170,.12);color:var(--green)}.b-err{background:rgba(239,68,68,.12);color:var(--red)}.b-info{background:rgba(67,97,238,.12);color:var(--blue)}
.hero{text-align:center;padding:80px 20px 60px;position:relative;z-index:1}
.hero h1{font-size:clamp(32px,6vw,56px);font-weight:800;color:var(--white);line-height:1.15;margin-bottom:16px}
.hero p{font-size:18px;color:#888;max-width:600px;margin:0 auto 32px;line-height:1.6}
.stats{display:flex;gap:32px;justify-content:center;margin-top:40px;flex-wrap:wrap}
.stat{text-align:center}.stat .n{font-size:30px;font-weight:800;color:var(--green)}.stat .l{font-size:12px;color:#666}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:1100px;margin:0 auto 60px;padding:0 20px;position:relative;z-index:1}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;transition:border .2s}.feat-card:hover{border-color:rgba(67,97,238,.3)}.feat-card .fi{font-size:36px;margin-bottom:16px}.feat-card h3{color:var(--white);margin-bottom:8px}.feat-card p{color:#888;font-size:14px;line-height:1.6}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:440px;width:92%;max-height:90vh;overflow-y:auto}
.toast-cont{position:fixed;top:16px;right:16px;z-index:9999}.toast{padding:12px 20px;border-radius:8px;font-size:13px;margin-bottom:8px;max-width:380px;animation:slide .3s}.toast-ok{background:#064e3b;color:#a7f3d0;border:1px solid #059669}.toast-err{background:#7f1d1d;color:#fecaca;border:1px solid #dc2626}@keyframes slide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.topbar{border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(18,18,42,.95);position:sticky;top:0;z-index:100}.top-l{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--white);font-size:17px}
.section{max-width:1100px;margin:0 auto;padding:20px;position:relative;z-index:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}@media(max-width:768px){.grid2{grid-template-columns:1fr}}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}@media(max-width:900px){.grid3{grid-template-columns:1fr}}
.progress-bar{height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.quiz-option{padding:12px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px;transition:all .15s;font-size:14px}.quiz-option:hover{border-color:var(--blue)}.quiz-option.sel{border-color:var(--green);background:rgba(0,212,170,.08);color:var(--green)}
.quiz-option.correct{border-color:var(--green);background:rgba(0,212,170,.15)}.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.08)}
.mentor-panel{position:fixed;bottom:20px;right:20px;z-index:99}.mentor-btn{width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;font-size:24px;box-shadow:0 4px 20px rgba(67,97,238,.4)}.mentor-chat{position:fixed;bottom:90px;right:20px;width:380px;max-height:500px;background:var(--card);border:1px solid var(--border);border-radius:16px;z-index:98;display:none;flex-direction:column;overflow:hidden}.mentor-chat.open{display:flex}.mentor-head{background:rgba(67,97,238,.1);padding:12px 16px;font-weight:700;color:var(--blue);font-size:13px}.mentor-body{flex:1;overflow-y:auto;padding:12px;max-height:300px;font-size:13px}.mentor-input{display:flex;padding:8px;border-top:1px solid var(--border)}.mentor-input input{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--white);font-size:12px;outline:none}.mentor-input button{padding:8px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;margin-left:6px;cursor:pointer;font-weight:700}
.ai-msg{margin-bottom:8px;padding:8px 12px;border-radius:10px;max-width:88%;line-height:1.5;font-size:12px}.ai-user{background:rgba(67,97,238,.12);color:#bae6fd;margin-left:auto}.ai-bot{background:rgba(0,212,170,.08);color:#a7f3d0}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;margin:0 auto;border:4px solid}.score-high{border-color:var(--green);color:var(--green)}.score-mid{border-color:#fca311;color:#fca311}.score-low{border-color:var(--red);color:var(--red)}
.fade-in{animation:fadeIn .4s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.footer{border-top:1px solid var(--border);padding:20px;text-align:center;font-size:11px;color:#555}
</style>
</head>
<body><div class="grid-bg"></div><div id="app"></div><div class="toast-cont" id="toasts"></div>

<script>
var API=window.location.hostname==='localhost'?'http://localhost:5000':'';
var STATE={view:'landing',user:null,token:null,assessment:null,currentQ:0,answers:{},diagnosticAnswers:{},step:'role'};

var JOB_ROLES=['Software Developer','Data Scientist','SAP Consultant','Product Manager','UX Designer','DevOps Engineer','Cybersecurity Analyst','Cloud Architect','AI/ML Engineer','Business Analyst'];
var CAREER_PATHS=['Technology & IT','Business & Finance','Healthcare','Education','Engineering','Design & Creative','Legal','Marketing & Sales'];
var EXP_LEVELS=['Entry Level (0-1 years)','Junior (1-3 years)','Mid-Level (3-5 years)','Senior (5+ years)'];

function $(id){return document.getElementById(id);}
function toast(m,ok){var d=document.createElement('div');d.className='toast '+(ok?'toast-ok':'toast-err');d.textContent=m;$('toasts').appendChild(d);setTimeout(function(){d.remove();},4500);}
async function api(method,path,body){var opts={method:method,headers:{'Content-Type':'application/json'}};if(STATE.token)opts.headers['Authorization']='Bearer '+STATE.token;if(body)opts.body=JSON.stringify(body);var r=await fetch(API+path,opts);var d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');return d;}

function render(){var root=$('app');root.innerHTML='';
  if(STATE.view==='landing')renderLanding(root);
  else if(STATE.view==='signup')renderSignup(root);
  else if(STATE.view==='dashboard')renderDashboard(root);
}

function renderLanding(root){
  root.innerHTML=''+
  '<div class="hero">'+
    '<div style="font-size:48px;margin-bottom:16px;">🎯</div>'+
    '<h1>Your <span class="grad">AI Career Coach</span></h1>'+
    '<p>Get AI-generated assessments, personalized career roadmaps, resume analysis, and 24/7 AI mentorship — all powered by advanced AI to help you land your dream job.</p>'+
    '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">'+
      '<button class="btn btn-p" style="padding:16px 32px;font-size:16px;" onclick="STATE.view=\'signup\';render();">🚀 Start Free</button>'+
      '<button class="btn btn-o" style="padding:16px 32px;font-size:16px;" onclick="document.getElementById(\'feat\').scrollIntoView({behavior:\'smooth\'})">Learn More</button>'+
    '</div>'+
    '<div class="stats">'+
      '<div class="stat"><div class="n">🤖</div><div class="l">AI-Powered</div></div>'+
      '<div class="stat"><div class="n">10+</div><div class="l">Job Roles</div></div>'+
      '<div class="stat"><div class="n">📊</div><div class="l">Gap Analysis</div></div>'+
      '<div class="stat"><div class="n">📝</div><div class="l">Resume AI</div></div>'+
    '</div>'+
  '</div>'+
  '<div id="feat" class="features">'+
    '<div class="feat-card"><div class="fi">🧠</div><h3>AI-Generated Assessments</h3><p>Get personalized multiple-choice questions generated by AI based on your target job role, career path, and experience level — not dummy data.</p></div>'+
    '<div class="feat-card"><div class="fi">📊</div><h3>Skill Gap Analysis</h3><p>AI analyzes your answers and identifies exactly what you\'re missing. Get a detailed report of strengths, weaknesses, and focus areas.</p></div>'+
    '<div class="feat-card"><div class="fi">🤖</div><h3>AI Career Mentor</h3><p>Chat with an AI mentor that knows your assessment results, understands your target role, and gives contextual, personalized advice 24/7.</p></div>'+
    '<div class="feat-card"><div class="fi">📝</div><h3>Resume Analyzer</h3><p>Paste your resume and get AI-powered feedback — gap analysis, ATS optimization, missing keywords, and an optimized version.</p></div>'+
    '<div class="feat-card"><div class="fi">📚</div><h3>Free Courses & Certs</h3><p>Get curated free courses and certifications matched to your career goals. Free tier gives 3 courses; upgrade for unlimited access.</p></div>'+
    '<div class="feat-card"><div class="fi">📧</div><h3>Email Reports</h3><p>Receive your complete assessment report, career roadmap, and recommendations via email — formatted and ready to review.</p></div>'+
  '</div>'+
  '<div class="section" style="text-align:center;margin-bottom:60px;">'+
    '<h2 style="color:var(--white);font-size:28px;margin-bottom:16px;">Simple <span class="grad">Pricing</span></h2>'+
    '<div class="grid2" style="max-width:700px;margin:0 auto;">'+
      '<div class="card"><h3>🆓 Free Tier</h3><p style="font-size:28px;font-weight:800;color:var(--green);">$0</p><p style="font-size:13px;color:#888;">2 assessments · 3 courses · 1 resume analysis · AI mentor · Email reports</p></div>'+
      '<div class="card" style="border-color:rgba(67,97,238,.3);"><h3>💎 Pro Tier</h3><p style="font-size:28px;font-weight:800;color:var(--blue);">$9/mo</p><p style="font-size:13px;color:#888;">Unlimited everything · Priority AI · Advanced analytics · Custom learning paths · Certificates</p></div>'+
    '</div>'+
  '</div>'+
  '<div class="footer">&copy; 2026 Skill Sprint. AI-Powered Career Coaching.</div>';
}

function renderSignup(root){
  root.innerHTML=''+
  '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:20px;">'+
    '<div class="card" style="width:420px;max-width:92%;">'+
      '<div style="text-align:center;margin-bottom:24px;">'+
        '<div style="font-size:40px;">🎯</div>'+
        '<h1 style="font-size:22px;font-weight:800;color:var(--white);">Skill <span class="grad">Sprint</span></h1>'+
        '<p style="font-size:13px;color:#888;">AI-Powered Career Coach</p>'+
      '</div>'+
      '<input id="regName" class="input" placeholder="Full Name" required>'+
      '<input id="regEmail" class="input" type="email" placeholder="Email Address" required>'+
      '<input id="regOrg" class="input" placeholder="Organization / University (optional)">'+
      '<button class="btn btn-p" style="width:100%;padding:14px;" onclick="doRegister()">🔐 Create Free Account</button>'+
      '<p style="text-align:center;font-size:12px;color:#666;margin-top:12px;">Already have an account? <a href="#" style="color:var(--blue);" onclick="doLogin();return false;">Log in</a></p>'+
      '<p style="text-align:center;margin-top:12px;"><button class="btn btn-o btn-sm" onclick="STATE.view=\'landing\';render();">← Back</button></p>'+
    '</div>'+
  '</div>';
}

async function doRegister(){
  var n=$('regName').value.trim(),em=$('regEmail').value.trim(),o=$('regOrg').value.trim();
  if(!n||!em||!em.includes('@')){toast('Name and valid email required',false);return;}
  try{
    await api('POST','/api/auth/register',{name:n,email:em,organization:o});
    toast('Account created! Check your email for the verification link.',true);
    // Try login anyway
    try{var l=await api('POST','/api/auth/login',{email:em});STATE.user=l.user;STATE.token=l.token;localStorage.setItem('ss_user',JSON.stringify({user:l.user,token:l.token}));STATE.view='dashboard';render();}catch(e2){}
  }catch(e){toast(e.message,false);}
}

async function doLogin(){
  var em=$('regEmail');var email=em?em.value.trim():null;
  if(!email||!email.includes('@')){toast('Enter your email first',false);return;}
  try{
    var l=await api('POST','/api/auth/login',{email:email});
    STATE.user=l.user;STATE.token=l.token;localStorage.setItem('ss_user',JSON.stringify({user:l.user,token:l.token}));STATE.view='dashboard';render();
  }catch(e){toast(e.message,false);}
}

// ── DASHBOARD ──
function renderDashboard(root){
  if(!STATE.user){STATE.view='landing';render();return;}
  if(STATE.step==='role')renderRoleSelect(root);
  else if(STATE.step==='quiz')renderQuiz(root);
  else if(STATE.step==='diagnostic')renderDiagnostic(root);
  else if(STATE.step==='report')renderReport(root);
  else if(STATE.step==='resume')renderResume(root);
  else if(STATE.step==='courses')renderCourses(root);
  else renderRoleSelect(root);
}

function dashHeader(){return'<header class="topbar"><div class="top-l">🎯 Skill <span class="grad">Sprint</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="font-size:13px;">'+STATE.user.name+'</span><span class="badge b-info">'+(STATE.user.subscription||'free')+'</span><button class="btn btn-o btn-sm" onclick="logout()">Logout</button></div></header>';}
function dashNav(current){return'<div class="section" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0;">'+
  '<button class="btn '+(current==='role'?'btn-p':'btn-o')+' btn-sm" onclick="STATE.step=\'role\';render();">📋 Assessment</button>'+
  '<button class="btn '+(current==='resume'?'btn-p':'btn-o')+' btn-sm" onclick="STATE.step=\'resume\';render();">📝 Resume</button>'+
  '<button class="btn '+(current==='courses'?'btn-p':'btn-o')+' btn-sm" onclick="STATE.step=\'courses\';render();">📚 Courses</button>'+
'</div>';}

function logout(){localStorage.removeItem('ss_user');STATE.user=null;STATE.token=null;STATE.view='landing';STATE.step='role';render();}

// ── ROLE SELECT ──
function renderRoleSelect(root){
  root.innerHTML=dashHeader()+dashNav('role')+
  '<div class="section"><div class="card">'+
    '<h3>🎯 What role are you targeting?</h3>'+
    '<p style="font-size:13px;color:#888;margin-bottom:20px;">We\'ll generate a personalized AI assessment based on your answers.</p>'+
    '<label>Target Job Role</label><select id="jobRole" class="input">'+JOB_ROLES.map(r=>'<option>'+r+'</option>').join('')+'</select>'+
    '<label>Career Path</label><select id="careerPath" class="input">'+CAREER_PATHS.map(p=>'<option>'+p+'</option>').join('')+'</select>'+
    '<label>Experience Level</label><select id="expLevel" class="input">'+EXP_LEVELS.map(e=>'<option>'+e+'</option>').join('')+'</select>'+
    '<button class="btn btn-p" style="width:100%;margin-top:16px;" onclick="generateAssessment()">🤖 Generate AI Assessment</button>'+
  '</div></div>';
}

async function generateAssessment(){
  var jr=$('jobRole').value,cp=$('careerPath').value,el=$('expLevel').value;
  var btn=event.target;btn.disabled=true;btn.textContent='⏳ AI is generating questions...';
  try{
    var r=await api('POST','/api/assessment/generate',{jobRole:jr,careerPath:cp,experienceLevel:el});
    STATE.assessment=r;STATE.currentQ=0;STATE.answers={};STATE.jobRole=jr;STATE.step='quiz';render();
  }catch(e){toast(e.message,false);}
  btn.disabled=false;btn.textContent='🤖 Generate AI Assessment';
}

// ── QUIZ ──
function renderQuiz(root){
  if(!STATE.assessment){STATE.step='role';render();return;}
  var qs=STATE.assessment.questions;var q=qs[STATE.currentQ];
  root.innerHTML=dashHeader()+
  '<div class="section"><div class="card">'+
    '<div style="margin-bottom:16px;"><span class="badge b-info">Question '+(STATE.currentQ+1)+'/'+qs.length+'</span><span style="font-size:10px;color:#888;margin-left:8px;">'+STATE.jobRole+'</span></div>'+
    '<div class="progress-bar" style="margin-bottom:20px;"><div class="progress-fill" style="width:'+((STATE.currentQ/qs.length)*100)+'%"></div></div>'+
    '<h3 style="margin-bottom:16px;">'+q.question+'</h3>'+
    '<div>'+q.options.map(function(o,i){return'<div class="quiz-option'+(STATE.answers[STATE.currentQ]===i?' sel':'')+'" onclick="selectAnswer('+i+')">'+o+'</div>';}).join('')+'</div>'+
    '<div style="display:flex;gap:10px;margin-top:20px;">'+
      (STATE.currentQ>0?'<button class="btn btn-o" onclick="STATE.currentQ--;render();">← Previous</button>':'')+
      '<button class="btn btn-p" style="margin-left:auto;" onclick="nextQuestion()">'+(STATE.currentQ<qs.length-1?'Next →':'Submit Assessment')+'</button>'+
    '</div>'+
  '</div></div>';
}
function selectAnswer(i){STATE.answers[STATE.currentQ]=i;render();}
function nextQuestion(){if(STATE.currentQ<STATE.assessment.questions.length-1){STATE.currentQ++;render();}else{submitAssessment();}}
async function submitAssessment(){
  try{
    var answers=STATE.assessment.questions.map(function(q,i){return STATE.answers[i]||0;});
    var r=await api('POST','/api/assessment/submit',{assessmentId:STATE.assessment.assessmentId,answers:answers,jobRole:STATE.jobRole});
    STATE.analysis=r.analysis;STATE.diagnosticQuestions=r.diagnosticQuestions;STATE.diagnosticAnswers={};STATE.diagIdx=0;STATE.step='diagnostic';render();
  }catch(e){toast(e.message,false);}
}

// ── DIAGNOSTIC ──
function renderDiagnostic(root){
  if(!STATE.diagnosticQuestions||STATE.diagnosticQuestions.length===0){generateReport();return;}
  var dq=STATE.diagnosticQuestions[STATE.diagIdx];
  root.innerHTML=dashHeader()+
  '<div class="section"><div class="card">'+
    '<div style="margin-bottom:16px;"><span class="badge b-info">Profile Question '+(STATE.diagIdx+1)+'/'+STATE.diagnosticQuestions.length+'</span></div>'+
    '<h3 style="margin-bottom:8px;">'+dq.question+'</h3>'+
    '<p style="font-size:11px;color:#888;margin-bottom:16px;">Category: '+dq.category+' | '+dq.expectedAnswer+'</p>'+
    '<textarea id="diagAnswer" class="input" rows="4" placeholder="Your answer..." style="resize:vertical;">'+(STATE.diagnosticAnswers[STATE.diagIdx]||'')+'</textarea>'+
    '<div style="display:flex;gap:10px;">'+
      (STATE.diagIdx>0?'<button class="btn btn-o" onclick="STATE.diagIdx--;render();">← Previous</button>':'')+
      '<button class="btn btn-p" style="margin-left:auto;" onclick="nextDiag()">'+(STATE.diagIdx<STATE.diagnosticQuestions.length-1?'Next →':'Generate Report')+'</button>'+
    '</div>'+
  '</div></div>';
}
function nextDiag(){STATE.diagnosticAnswers[STATE.diagIdx]=$('diagAnswer').value;if(STATE.diagIdx<STATE.diagnosticQuestions.length-1){STATE.diagIdx++;render();}else{generateReport();}}
async function generateReport(){
  try{
    var r=await api('POST','/api/assessment/report',{assessmentId:STATE.assessment.assessmentId,jobRole:STATE.jobRole,diagnosticAnswers:STATE.diagnosticQuestions.map(function(q,i){return{question:q.question,answer:STATE.diagnosticAnswers[i]||''};}),userName:STATE.user.name});
    STATE.report=r.report;STATE.step='report';render();
  }catch(e){toast(e.message,false);}
}

// ── REPORT ──
function renderReport(root){
  if(!STATE.report){STATE.step='role';render();return;}
  var r=STATE.report;var sc=r.score||STATE.analysis.score||0;
  root.innerHTML=dashHeader()+dashNav('role')+
  '<div class="section"><div class="card fade-in">'+
    '<h2 style="color:var(--white);text-align:center;margin-bottom:24px;">📊 Your Career Analysis — '+STATE.jobRole+'</h2>'+
    '<div class="score-circle '+(sc>=70?'score-high':sc>=40?'score-mid':'score-low')+'" style="margin-bottom:24px;">'+sc+'%</div>'+
    '<p style="text-align:center;color:#888;margin-bottom:24px;">'+(r.executiveSummary||r.summary||'')+'</p>'+
    '<div class="grid2">'+
      '<div class="card"><h3>✅ Strengths</h3>'+(r.strengths||STATE.analysis.strengths||[]).map(function(s){return'<p style="font-size:13px;color:var(--green);margin-bottom:4px;">• '+(s.description||s)+'</p>';}).join('')+'</div>'+
      '<div class="card"><h3>⚠️ Skill Gaps</h3>'+(r.skillGaps||STATE.analysis.skillGaps||[]).map(function(g){return'<p style="font-size:13px;color:#fca311;margin-bottom:4px;">• <strong>'+(g.skill||g)+'</strong>: '+(g.gap||'Needs improvement')+'</p>';}).join('')+'</div>'+
    '</div>'+
    (r.learningPath?'<div class="card" style="margin-top:20px;"><h3>🗺️ Your Learning Path</h3>'+r.learningPath.map(function(s,i){return'<p style="font-size:13px;color:#888;margin-bottom:4px;"><strong>'+(i+1)+'.</strong> '+s+'</p>';}).join('')+'</div>':'')+
    (r.focusAreas?'<div class="card" style="margin-top:20px;"><h3>🎯 Focus Areas</h3>'+r.focusAreas.map(function(f){var a=typeof f===\'string\'?f:f.area;return'<p style="font-size:13px;color:#888;margin-bottom:4px;">• <strong>'+a+'</strong>: '+(f.why||'')+'</p>';}).join('')+'</div>':'')+
    (r.recommendedCourses?'<div class="card" style="margin-top:20px;"><h3>📚 Recommended Courses</h3>'+r.recommendedCourses.slice(0,5).map(function(c){return'<p style="font-size:13px;margin-bottom:8px;"><strong>'+c.name+'</strong><br><span style="color:#888;">'+c.platform+' · '+c.level+' · '+c.cost+'</span></p>';}).join('')+'</div>':'')+
    (r.certifications?'<div class="card" style="margin-top:20px;"><h3>🏅 Recommended Certifications</h3>'+r.certifications.slice(0,4).map(function(c){return'<p style="font-size:13px;margin-bottom:4px;">• <strong>'+c.name+'</strong> — '+c.issuer+' <span style="color:#888;">('+c.value+')</span></p>';}).join('')+'</div>':'')+
    '<div style="text-align:center;margin-top:24px;">'+
      '<p style="font-size:13px;color:#888;margin-bottom:12px;">'+(r.timeToHire?'⏱️ Estimated time to job-ready: <strong style="color:var(--white);">'+r.timeToHire+'</strong>':'')+'</p>'+
      (r.salaryRange?'<p style="font-size:13px;color:#888;margin-bottom:12px;">💰 Estimated salary: <strong style="color:var(--green);">'+r.salaryRange+'</strong></p>':'')+
      '<button class="btn btn-p" onclick="STATE.step=\'resume\';render();">📝 Analyze Resume Next</button>'+
      '<button class="btn btn-o" style="margin-left:8px;" onclick="STATE.step=\'role\';STATE.assessment=null;STATE.answers={};render();">🔄 New Assessment</button>'+
    '</div>'+
    (r.finalAdvice?'<div class="card" style="margin-top:20px;text-align:center;"><p style="color:var(--green);font-style:italic;">💡 '+r.finalAdvice+'</p></div>':'')+
  '</div></div>';
}

// ── RESUME ──
function renderResume(root){
  root.innerHTML=dashHeader()+dashNav('resume')+
  '<div class="section"><div class="card">'+
    '<h3>📝 Resume Analyzer & Optimizer</h3>'+
    '<p style="font-size:13px;color:#888;margin-bottom:16px;">Paste your resume below and AI will analyze it for gaps, ATS compatibility, and provide an optimized version.</p>'+
    '<label>Target Job Role</label><select id="resumeRole" class="input">'+JOB_ROLES.map(r=>'<option'+(STATE.jobRole===r?' selected':'')+'>'+r+'</option>').join('')+'</select>'+
    '<label>Your Resume Text</label><textarea id="resumeText" class="input" rows="8" placeholder="Paste your full resume here..." style="resize:vertical;font-family:monospace;font-size:12px;"></textarea>'+
    '<button class="btn btn-p" style="width:100%;" onclick="analyzeResume()">🤖 Analyze Resume</button>'+
    '<div id="resumeResult"></div>'+
  '</div></div>';
}
async function analyzeResume(){
  var rt=$('resumeText').value,rr=$('resumeRole').value;if(rt.length<50){toast('Paste at least 50 characters of your resume',false);return;}
  var btn=event.target;btn.disabled=true;btn.textContent='⏳ Analyzing...';
  try{
    var r=await api('POST','/api/resume/analyze',{resumeText:rt,jobRole:rr});var a=r.analysis;
    var html='<div class="card fade-in" style="margin-top:16px;">'+
      '<h3>📊 Resume Score: '+a.overallScore+'/100</h3>'+
      '<p style="font-size:13px;color:#888;">ATS Score: '+a.atsScore+'/100</p>'+
      '<p style="font-size:13px;color:#888;margin-top:8px;">'+a.summary+'</p>'+
      '<div class="grid2" style="margin-top:16px;">'+
        '<div><h4 style="color:var(--green);">✅ Strengths</h4>'+(a.strengths||[]).map(function(s){return'<p style="font-size:12px;">• '+s+'</p>';}).join('')+'</div>'+
        '<div><h4 style="color:#fca311;">⚠️ Gaps</h4>'+(a.gaps||[]).map(function(g){return'<p style="font-size:12px;">• <strong>'+g.section+'</strong>: '+g.issue+' → '+g.suggestion+'</p>';}).join('')+'</div>'+
      '</div>'+
      (a.keywords&&a.keywords.length?'<div style="margin-top:12px;"><h4 style="color:var(--blue);">🔑 Missing Keywords</h4><p style="font-size:12px;color:#888;">'+a.keywords.join(', ')+'</p></div>':'')+
      (a.optimizedResume?'<div style="margin-top:16px;"><h4 style="color:var(--green);">✨ Optimized Resume</h4><textarea class="input" rows="8" style="font-family:monospace;font-size:11px;resize:vertical;">'+a.optimizedResume+'</textarea></div>':'')+
    '</div>';
    $('resumeResult').innerHTML=html;
  }catch(e){toast(e.message,false);}
  btn.disabled=false;btn.textContent='🤖 Analyze Resume';
}

// ── COURSES ──
function renderCourses(root){
  root.innerHTML=dashHeader()+dashNav('courses')+
  '<div class="section"><div class="card"><h3>📚 Recommended Courses for '+STATE.jobRole+'</h3><div id="coursesList"><p style="color:#888;">Loading...</p></div></div></div>';
  loadCourses();
}
async function loadCourses(){
  try{
    var r=await api('GET','/api/courses/'+encodeURIComponent(STATE.jobRole||'Software Developer'));var html='';
    html+='<h4 style="color:var(--green);margin-top:16px;">🆓 Free Courses ('+r.freeCourses.length+' of '+r.freeLimit+' shown)</h4>';
    r.freeCourses.forEach(function(c){html+='<p style="font-size:13px;margin-bottom:6px;">• <strong>'+c.name+'</strong> — '+c.platform+' ('+c.level+')</p>';});
    if(r.paidCourses.length){html+='<h4 style="color:var(--blue);margin-top:16px;">💎 Premium Courses</h4>';
    r.paidCourses.forEach(function(c){html+='<p style="font-size:13px;margin-bottom:6px;">• <strong>'+c.name+'</strong> — '+c.platform+' ('+c.level+')</p>';});}
    if(!r.isPaid)html+='<div class="card" style="margin-top:16px;text-align:center;border-color:rgba(67,97,238,.3);"><p style="color:var(--blue);">💎 Upgrade to Pro for unlimited courses & certificates</p></div>';
    $('coursesList').innerHTML=html;
  }catch(e){$('coursesList').innerHTML='<p style="color:var(--red);">Failed to load courses.</p>';}
}

// ── AI MENTOR (always available) ──
document.addEventListener('DOMContentLoaded',function(){
  var mentorHTML='<div class="mentor-panel"><button class="mentor-btn" onclick="toggleMentor()">🤖</button><div class="mentor-chat" id="mentorChat"><div class="mentor-head">🤖 AI Career Mentor</div><div class="mentor-body" id="mentorBody"><div class="ai-msg ai-bot">Hi! I\'m your AI career mentor. I can see your assessment results and help with career advice. Ask me anything!</div></div><div class="mentor-input"><input id="mentorInput" placeholder="Ask about your career..." onkeydown="if(event.key===\'Enter\')sendMentor()"><button onclick="sendMentor()">Send</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',mentorHTML);
});

var MENTOR_HIST=[];
function toggleMentor(){var c=$('mentorChat');c.classList.toggle('open');if(c.classList.contains('open')){$('mentorInput').focus();}}
async function sendMentor(){
  var inp=$('mentorInput'),msg=inp.value.trim();if(!msg)return;inp.value='';
  var body=$('mentorBody');body.innerHTML+='<div class="ai-msg ai-user">'+msg.replace(/</g,'&lt;')+'</div><div id="mTyping" style="color:var(--blue);font-size:11px;">Thinking...</div>';body.scrollTop=body.scrollHeight;
  try{
    var r=await api('POST','/api/mentor/chat',{message:msg,chatHistory:MENTOR_HIST});
    var t=$('mTyping');if(t)t.remove();MENTOR_HIST.push({role:'user',content:msg},{role:'assistant',content:r.response});if(MENTOR_HIST.length>10)MENTOR_HIST=MENTOR_HIST.slice(-10);
    body.innerHTML+='<div class="ai-msg ai-bot">'+r.response.replace(/</g,'&lt;')+'</div>';
  }catch(e){var t=$('mTyping');if(t)t.remove();body.innerHTML+='<div class="ai-msg ai-bot" style="color:var(--red);">Error: '+e.message+'</div>';}
  body.scrollTop=body.scrollHeight;
}

// ── Init ──
function initApp(){
  try{var saved=localStorage.getItem('ss_user');if(saved){var d=JSON.parse(saved);STATE.user=d.user;STATE.token=d.token;STATE.view='dashboard';}}catch(e){}
  var params=new URLSearchParams(window.location.search);
  if(params.get('token')){api('GET','/api/auth/verify?token='+params.get('token')).then(function(){toast('Email verified!',true);window.history.replaceState({},'','/');}).catch(function(e){toast(e.message,false);});}
  render();
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initApp);}else{initApp();}
</script>
</body>
</html>
