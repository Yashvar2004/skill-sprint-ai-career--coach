<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Skill Sprint — AI Career Coach</title>
<style>
:root{--bg:#0a0a1a;--card:#12122a;--border:rgba(255,255,255,0.06);--green:#00d4aa;--blue:#4361ee;--red:#ef4444;--text:#a0a0b0;--white:#e0e0f0;--accent:linear-gradient(135deg,#4361ee,#7209b7)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(67,97,238,0.03)1px,transparent 1px);background-size:30px 30px}
.grad{background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{font-weight:600;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff;padding:12px 24px}.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 30px rgba(67,97,238,.25)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 18px}.btn-o:hover{border-color:var(--blue)}
.btn-sm{padding:6px 14px;font-size:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}.card h3{color:var(--white);font-size:15px;margin-bottom:12px}
.input{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--white);font-size:14px;outline:none;margin-bottom:12px}.input:focus{border-color:var(--blue)}.input::placeholder{color:#444}
select.input{cursor:pointer}
label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase}.b-ok{background:rgba(0,212,170,.12);color:var(--green)}.b-info{background:rgba(67,97,238,.12);color:var(--blue)}
.topbar{border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(18,18,42,.95);position:sticky;top:0;z-index:100}.top-l{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--white);font-size:17px}
.section{max-width:900px;margin:0 auto;padding:20px;position:relative;z-index:1}
.toast-cont{position:fixed;top:16px;right:16px;z-index:9999}.toast{padding:12px 20px;border-radius:8px;font-size:13px;margin-bottom:8px;max-width:380px;animation:slide .3s}.toast-ok{background:#064e3b;color:#a7f3d0;border:1px solid #059669}.toast-err{background:#7f1d1d;color:#fecaca;border:1px solid #dc2626}@keyframes slide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.fade-in{animation:fadeIn .4s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
footer{border-top:1px solid var(--border);padding:20px;text-align:center;font-size:11px;color:#555}
.opt-btn{padding:14px 18px;border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:left;margin-bottom:8px;transition:all .15s;background:transparent;color:var(--text);font-size:14px;width:100%}.opt-btn:hover{border-color:var(--blue)}.opt-btn.sel{border-color:var(--green);background:rgba(0,212,170,.06);color:var(--green)}
.score-box{text-align:center;padding:24px}.score-num{font-size:48px;font-weight:800}.high{color:var(--green)}.mid{color:#fca311}.low{color:var(--red)}
.ai-btn{position:fixed;bottom:20px;right:20px;z-index:99;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(67,97,238,.4)}
.ai-panel{position:fixed;bottom:80px;right:20px;width:360px;max-height:480px;background:var(--card);border:1px solid var(--border);border-radius:16px;z-index:98;display:none;flex-direction:column;overflow:hidden}.ai-panel.show{display:flex}
.ai-head{background:rgba(67,97,238,.1);padding:10px 14px;font-weight:700;color:var(--blue);font-size:13px}
.ai-body{flex:1;overflow-y:auto;padding:10px;max-height:300px;font-size:12px}
.ai-msg{margin-bottom:8px;padding:8px 12px;border-radius:10px;max-width:88%;line-height:1.5}.ai-user{background:rgba(67,97,238,.12);color:#bae6fd;margin-left:auto}.ai-bot{background:rgba(0,212,170,.08);color:#a7f3d0}
.ai-row{display:flex;padding:8px;border-top:1px solid var(--border)}.ai-row input{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--white);font-size:12px;outline:none}.ai-row button{padding:8px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;margin-left:6px;cursor:pointer;font-weight:700}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="app"></div>
<div class="toast-cont" id="toasts"></div>

<!-- AI Mentor Button -->
<button class="ai-btn" id="aiBtn" onclick="toggleAI()">🤖</button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-head">🤖 AI Career Mentor</div>
  <div class="ai-body" id="aiBody"><div class="ai-msg ai-bot">Hello! I am your AI career mentor. Ask me anything about your career, skills, or job search.</div></div>
  <div class="ai-row"><input id="aiInput" placeholder="Ask about your career..." onkeydown="if(event.key==='Enter')sendAI()"><button onclick="sendAI()">Send</button></div>
</div>

<script>
// ── GLOBAL STATE ──
var API = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';
var S = {
  view: 'landing',  // landing | signup | home | quiz | report | resume | courses
  user: null,
  token: null,
  jobRole: 'Software Developer',
  assessment: null,
  currentQ: 0,
  answers: {},
  analysis: null,
  report: null,
  diagQuestions: [],
  diagAnswers: {},
  diagIdx: 0
};

var ROLES = ['Software Developer','Data Scientist','SAP Consultant','Product Manager','UX Designer','DevOps Engineer','Cybersecurity Analyst','Cloud Architect','AI/ML Engineer','Business Analyst'];
var PATHS = ['Technology & IT','Business & Finance','Healthcare','Education','Engineering','Design & Creative'];
var LEVELS = ['Entry Level (0-1 yrs)','Junior (1-3 yrs)','Mid-Level (3-5 yrs)','Senior (5+ yrs)'];

var MENTOR_HIST = [];

// ── HELPERS ──
function $(id){ return document.getElementById(id); }
function toast(msg, ok){
  var d = document.createElement('div');
  d.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  d.textContent = msg;
  $('toasts').appendChild(d);
  setTimeout(function(){ d.remove(); }, 4500);
}

async function api(method, path, body){
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(API + path, opts);
  var d = await r.json();
  if (!r.ok) {
    if (d.error === 'Invalid token' || d.error === 'Not authenticated') {
      localStorage.removeItem('ss_user');
      S.user = null; S.token = null; S.view = 'landing';
      render();
      toast('Session expired. Please log in again.', 'err');
      throw new Error('Session expired');
    }
    throw new Error(d.error || 'Request failed');
  }
  return d;
}

// ── RENDER ──
function render(){
  var root = $('app');
  if (S.view === 'landing') showLanding(root);
  else if (S.view === 'signup') showSignup(root);
  else if (S.view === 'home') showHome(root);
  else if (S.view === 'quiz') showQuiz(root);
  else if (S.view === 'report') showReport(root);
  else if (S.view === 'resume') showResume(root);
  else if (S.view === 'courses') showCourses(root);
}

// ── LANDING ──
function showLanding(root){
  var h = '';
  h += '<div style="text-align:center;padding:80px 20px 60px;position:relative;z-index:1;">';
  h += '<div style="font-size:48px;margin-bottom:16px;">🎯</div>';
  h += '<h1 style="font-size:clamp(32px,6vw,56px);font-weight:800;color:var(--white);line-height:1.15;margin-bottom:16px;">Your <span class="grad">AI Career Coach</span></h1>';
  h += '<p style="font-size:18px;color:#888;max-width:600px;margin:0 auto 32px;line-height:1.6;">Get AI-generated assessments, personalized career roadmaps, resume analysis, and 24/7 AI mentorship — all powered by DeepSeek AI.</p>';
  h += '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">';
  h += '<button class="btn btn-p" style="padding:16px 32px;font-size:16px;" id="startBtn">🚀 Start Free</button>';
  h += '</div>';
  h += '<div style="display:flex;gap:32px;justify-content:center;margin-top:40px;flex-wrap:wrap;">';
  h += '<div style="text-align:center;"><div style="font-size:30px;font-weight:800;color:var(--green);">🤖</div><div style="font-size:12px;color:#666;">AI-Powered</div></div>';
  h += '<div style="text-align:center;"><div style="font-size:30px;font-weight:800;color:var(--green);">10+</div><div style="font-size:12px;color:#666;">Job Roles</div></div>';
  h += '<div style="text-align:center;"><div style="font-size:30px;font-weight:800;color:var(--green);">📊</div><div style="font-size:12px;color:#666;">Gap Analysis</div></div>';
  h += '<div style="text-align:center;"><div style="font-size:30px;font-weight:800;color:var(--green);">📝</div><div style="font-size:12px;color:#666;">Resume AI</div></div>';
  h += '</div></div>';

  h += '<div class="section" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding-bottom:60px;">';
  h += '<div class="card"><div style="font-size:32px;margin-bottom:12px;">🧠</div><h3>AI-Generated Assessments</h3><p style="font-size:13px;color:#888;">Real questions generated by AI based on your target role — not dummy data.</p></div>';
  h += '<div class="card"><div style="font-size:32px;margin-bottom:12px;">📊</div><h3>Skill Gap Analysis</h3><p style="font-size:13px;color:#888;">AI identifies exactly what you need to improve with personalized recommendations.</p></div>';
  h += '<div class="card"><div style="font-size:32px;margin-bottom:12px;">🤖</div><h3>AI Career Mentor</h3><p style="font-size:13px;color:#888;">Chat with an AI mentor that knows your results and gives contextual advice 24/7.</p></div>';
  h += '<div class="card"><div style="font-size:32px;margin-bottom:12px;">📝</div><h3>Resume Analyzer</h3><p style="font-size:13px;color:#888;">Get ATS scoring, gap detection, and an AI-optimized version of your resume.</p></div>';
  h += '<div class="card"><div style="font-size:32px;margin-bottom:12px;">📚</div><h3>Free Courses</h3><p style="font-size:13px;color:#888;">Curated free courses and certifications matched to your career goals.</p></div>';
  h += '<div class="card"><div style="font-size:32px;margin-bottom:12px;">📧</div><h3>Email Reports</h3><p style="font-size:13px;color:#888;">Complete assessment report delivered to your inbox with actionable next steps.</p></div>';
  h += '</div>';
  h += '<footer>&copy; 2026 Skill Sprint. AI-Powered Career Coaching.</footer>';

  root.innerHTML = h;
  document.getElementById('startBtn').addEventListener('click', function(){ S.view = 'signup'; render(); });
}

// ── SIGNUP ──
function showSignup(root){
  var h = '';
  h += '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:20px;">';
  h += '<div class="card" style="width:420px;max-width:92%;">';
  h += '<div style="text-align:center;margin-bottom:24px;"><div style="font-size:40px;">🎯</div>';
  h += '<h1 style="font-size:22px;font-weight:800;color:var(--white);">Skill <span class="grad">Sprint</span></h1>';
  h += '<p style="font-size:13px;color:#888;">AI-Powered Career Coach</p></div>';
  h += '<input id="regName" class="input" placeholder="Full Name" autocomplete="name">';
  h += '<input id="regEmail" class="input" type="email" placeholder="Email Address" autocomplete="email">';
  h += '<input id="regOrg" class="input" placeholder="Organization / University (optional)">';
  h += '<button class="btn btn-p" style="width:100%;padding:14px;" id="regBtn">🔐 Create Free Account</button>';
  h += '<p style="text-align:center;font-size:12px;color:#666;margin-top:12px;">Already have an account? <a href="#" id="loginLink" style="color:var(--blue);">Log in</a></p>';
  h += '<p style="text-align:center;margin-top:12px;"><button class="btn btn-o btn-sm" id="backBtn">← Back</button></p>';
  h += '</div></div>';
  root.innerHTML = h;

  document.getElementById('regBtn').addEventListener('click', doRegister);
  document.getElementById('loginLink').addEventListener('click', function(e){ e.preventDefault(); doLogin(); });
  document.getElementById('backBtn').addEventListener('click', function(){ S.view = 'landing'; render(); });
}

async function doRegister(){
  var n = $('regName').value.trim();
  var em = $('regEmail').value.trim();
  var o = $('regOrg').value.trim();
  if (!n || !em || em.indexOf('@') === -1) { toast('Name and valid email required', false); return; }
  try {
    await api('POST', '/api/auth/register', { name: n, email: em, organization: o });
    toast('Account created! Check your email.', true);
    doLogin();
  } catch(e) { toast(e.message, false); }
}

async function doLogin(){
  var em = $('regEmail');
  var email = em ? em.value.trim() : null;
  if (!email || email.indexOf('@') === -1) { toast('Enter your email first', false); return; }
  try {
    var r = await api('POST', '/api/auth/login', { email: email });
    S.user = r.user;
    S.token = r.token;
    var save = { user: r.user, token: r.token };
    localStorage.setItem('ss_user', JSON.stringify(save));
    S.view = 'home';
    render();
    toast('Welcome, ' + r.user.name + '!', true);
  } catch(e) { toast(e.message, false); }
}

// ── HOME / DASHBOARD ──
function showHome(root){
  if (!S.user) { S.view = 'landing'; render(); return; }

  var h = '';
  h += '<header class="topbar"><div class="top-l">🎯 Skill <span class="grad">Sprint</span></div>';
  h += '<div style="display:flex;align-items:center;gap:12px;">';
  h += '<span style="font-size:13px;">' + S.user.name + '</span>';
  h += '<span class="badge b-info">' + (S.user.subscription || 'free') + '</span>';
  h += '<button class="btn btn-o btn-sm" id="logoutBtn">Logout</button></div></header>';

  h += '<div class="section" style="display:flex;gap:8px;flex-wrap:wrap;">';
  h += '<button class="btn btn-p btn-sm">📋 Assessment</button>';
  h += '<button class="btn btn-o btn-sm" id="resumeTab">📝 Resume</button>';
  h += '<button class="btn btn-o btn-sm" id="coursesTab">📚 Courses</button></div>';

  h += '<div class="section"><div class="card fade-in">';
  h += '<h3>🎯 What role are you targeting?</h3>';
  h += '<p style="font-size:13px;color:#888;margin-bottom:20px;">AI will generate a personalized assessment based on your answers.</p>';
  h += '<label>Target Job Role</label>';
  h += '<input id="jobRole" class="input" list="rolesList" placeholder="Type any role (e.g., Backend Developer, Data Analyst, Product Manager)" value="' + (S.jobRole || '') + '">';
  h += '<datalist id="rolesList">';
  ROLES.forEach(function(r){ h += '<option value="' + r + '">'; });
  h += '</datalist>';
  h += '<label>Career Path</label><select id="careerPath" class="input">';
  PATHS.forEach(function(p){ h += '<option>' + p + '</option>'; });
  h += '</select>';
  h += '<label>Experience Level</label><select id="expLevel" class="input">';
  LEVELS.forEach(function(e){ h += '<option>' + e + '</option>'; });
  h += '</select>';
  h += '<button class="btn btn-p" style="width:100%;margin-top:16px;" id="genBtn">🤖 Generate AI Assessment</button>';
  h += '</div></div>';

  root.innerHTML = h;

  document.getElementById('logoutBtn').addEventListener('click', function(){ localStorage.removeItem('ss_user'); S.user = null; S.token = null; S.view = 'landing'; render(); });
  document.getElementById('resumeTab').addEventListener('click', function(){ S.view = 'resume'; render(); });
  document.getElementById('coursesTab').addEventListener('click', function(){ S.view = 'courses'; render(); });
  document.getElementById('genBtn').addEventListener('click', generateAssessment);
}

async function generateAssessment(){
  var jr = $('jobRole').value;
  var cp = $('careerPath').value;
  var el = $('expLevel').value;
  S.jobRole = jr;
  var btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '⏳ AI is generating questions...';
  try {
    var r = await api('POST', '/api/assessment/generate', { jobRole: jr, careerPath: cp, experienceLevel: el });
    S.assessment = r;
    S.currentQ = 0;
    S.answers = {};
    S.view = 'quiz';
    render();
  } catch(e) { toast(e.message, false); btn.disabled = false; btn.textContent = '🤖 Generate AI Assessment'; }
}

// ── QUIZ ──
function showQuiz(root){
  if (!S.assessment) { S.view = 'home'; render(); return; }
  var qs = S.assessment.questions;
  var q = qs[S.currentQ];

  var h = '';
  h += '<header class="topbar"><div class="top-l">🎯 Skill <span class="grad">Sprint</span></div><span style="font-size:13px;">' + (S.user ? S.user.name : '') + '</span></header>';
  h += '<div class="section"><div class="card fade-in">';
  h += '<div style="margin-bottom:16px;"><span class="badge b-info">Question ' + (S.currentQ + 1) + '/' + qs.length + '</span>';
  h += '<span style="font-size:10px;color:#888;margin-left:8px;">' + S.jobRole + ' · ' + (q.skill || '') + '</span></div>';
  h += '<h3 style="margin-bottom:20px;">' + q.question + '</h3>';
  q.options.forEach(function(o, i){
    h += '<button class="opt-btn' + (S.answers[S.currentQ] === i ? ' sel' : '') + '" id="opt' + i + '">' + o + '</button>';
  });
  h += '<div style="display:flex;gap:10px;margin-top:20px;">';
  if (S.currentQ > 0) h += '<button class="btn btn-o" id="prevBtn">← Previous</button>';
  h += '<button class="btn btn-p" style="margin-left:auto;" id="nextBtn">' + (S.currentQ < qs.length - 1 ? 'Next →' : 'Submit Assessment') + '</button>';
  h += '</div></div></div>';
  root.innerHTML = h;

  q.options.forEach(function(o, i){
    document.getElementById('opt' + i).addEventListener('click', function(){ S.answers[S.currentQ] = i; showQuiz(root); });
  });
  if (S.currentQ > 0) document.getElementById('prevBtn').addEventListener('click', function(){ S.currentQ--; showQuiz(root); });
  document.getElementById('nextBtn').addEventListener('click', function(){
    if (S.currentQ < qs.length - 1) { S.currentQ++; showQuiz(root); }
    else submitAssessment();
  });
}

async function submitAssessment(){
  try {
    var answers = S.assessment.questions.map(function(q, i){ return S.answers[i] || 0; });
    var r = await api('POST', '/api/assessment/submit', { assessmentId: S.assessment.assessmentId, answers: answers, jobRole: S.jobRole });
    S.analysis = r.analysis;
    S.diagQuestions = r.diagnosticQuestions || [];
    S.diagAnswers = {};
    S.diagIdx = 0;

    if (S.diagQuestions.length > 0) {
      showDiagnostic();
    } else {
      generateReport();
    }
  } catch(e) { toast(e.message, false); }
}

function showDiagnostic(){
  var dq = S.diagQuestions[S.diagIdx];
  var root = $('app');
  var h = '';
  h += '<header class="topbar"><div class="top-l">🎯 Skill <span class="grad">Sprint</span></div><span style="font-size:13px;">' + (S.user ? S.user.name : '') + '</span></header>';
  h += '<div class="section"><div class="card fade-in">';
  h += '<div style="margin-bottom:16px;"><span class="badge b-info">Profile Q ' + (S.diagIdx + 1) + '/' + S.diagQuestions.length + '</span>';
  h += '<span style="font-size:10px;color:#888;margin-left:8px;">' + (dq.category || '') + '</span></div>';
  h += '<h3 style="margin-bottom:8px;">' + dq.question + '</h3>';
  h += '<p style="font-size:11px;color:#888;margin-bottom:16px;">' + (dq.expectedAnswer || '') + '</p>';
  h += '<textarea id="diagAnswer" class="input" rows="4" style="resize:vertical;">' + (S.diagAnswers[S.diagIdx] || '') + '</textarea>';
  h += '<div style="display:flex;gap:10px;margin-top:16px;">';
  if (S.diagIdx > 0) h += '<button class="btn btn-o" id="dPrevBtn">← Previous</button>';
  h += '<button class="btn btn-p" style="margin-left:auto;" id="dNextBtn">' + (S.diagIdx < S.diagQuestions.length - 1 ? 'Next →' : 'Generate Report') + '</button>';
  h += '</div></div></div>';
  root.innerHTML = h;

  if (S.diagIdx > 0) document.getElementById('dPrevBtn').addEventListener('click', function(){
    S.diagAnswers[S.diagIdx] = $('diagAnswer').value;
    S.diagIdx--;
    showDiagnostic();
  });
  document.getElementById('dNextBtn').addEventListener('click', function(){
    S.diagAnswers[S.diagIdx] = $('diagAnswer').value;
    if (S.diagIdx < S.diagQuestions.length - 1) { S.diagIdx++; showDiagnostic(); }
    else generateReport();
  });
}

async function generateReport(){
  try {
    var diagData = S.diagQuestions.map(function(q, i){ return { question: q.question, answer: S.diagAnswers[i] || '' }; });
    var r = await api('POST', '/api/assessment/report', {
      assessmentId: S.assessment.assessmentId,
      jobRole: S.jobRole,
      diagnosticAnswers: diagData,
      userName: S.user ? S.user.name : 'User'
    });
    S.report = r.report;
    S.view = 'report';
    render();
  } catch(e) { toast(e.message, false); }
}

// ── REPORT ──
function showReport(root){
  if (!S.report && !S.analysis) { S.view = 'home'; render(); return; }
  var r = S.report || {};
  var a = S.analysis || {};
  var sc = r.score || a.score || 0;

  var h = '';
  h += '<header class="topbar"><div class="top-l">🎯 Skill <span class="grad">Sprint</span></div>';
  h += '<div style="display:flex;align-items:center;gap:12px;"><span style="font-size:13px;">' + (S.user ? S.user.name : '') + '</span>';
  h += '<button class="btn btn-o btn-sm" id="logoutBtn2">Logout</button></div></header>';
  h += '<div class="section"><div class="card fade-in">';
  h += '<h2 style="color:var(--white);text-align:center;margin-bottom:24px;">📊 Career Report — ' + S.jobRole + '</h2>';
  h += '<div class="score-box"><div class="score-num ' + (sc >= 70 ? 'high' : sc >= 40 ? 'mid' : 'low') + '">' + sc + '%</div>';
  h += '<p style="color:#888;margin-top:8px;">Readiness: ' + (r.readinessLevel || a.readinessLevel || 'Evaluating') + '</p></div>';
  h += '<p style="text-align:center;color:#888;margin-bottom:24px;">' + (r.executiveSummary || r.summary || a.summary || '') + '</p>';

  // Strengths
  var strengths = r.strengths || a.strengths || [];
  if (strengths.length) {
    h += '<h3 style="color:var(--green);">✅ Strengths</h3>';
    strengths.forEach(function(s){ h += '<p style="font-size:13px;color:var(--green);margin-bottom:4px;">• ' + (s.description || s) + '</p>'; });
  }

  // Gaps
  var gaps = r.skillGaps || a.skillGaps || [];
  if (gaps.length) {
    h += '<h3 style="color:#fca311;margin-top:20px;">⚠️ Skill Gaps</h3>';
    gaps.forEach(function(g){ h += '<p style="font-size:13px;color:#fca311;margin-bottom:4px;">• <strong>' + (g.skill || g) + '</strong>: ' + (g.gap || 'Needs improvement') + '</p>'; });
  }

  // Learning path
  if (r.learningPath && r.learningPath.length) {
    h += '<h3 style="color:var(--white);margin-top:20px;">🗺️ Learning Path</h3>';
    r.learningPath.forEach(function(s, i){ h += '<p style="font-size:13px;color:#888;margin-bottom:4px;"><strong>' + (i + 1) + '.</strong> ' + s + '</p>'; });
  }

  // Courses
  if (r.recommendedCourses && r.recommendedCourses.length) {
    h += '<h3 style="color:var(--white);margin-top:20px;">📚 Recommended Courses</h3>';
    r.recommendedCourses.slice(0, 5).forEach(function(c){ h += '<p style="font-size:13px;margin-bottom:6px;">• <strong>' + c.name + '</strong> — ' + c.platform + ' (' + c.cost + ')</p>'; });
  }

  // Certifications
  if (r.certifications && r.certifications.length) {
    h += '<h3 style="color:var(--white);margin-top:20px;">🏅 Certifications</h3>';
    r.certifications.slice(0, 4).forEach(function(c){ h += '<p style="font-size:13px;margin-bottom:4px;">• <strong>' + c.name + '</strong> — ' + c.issuer + '</p>'; });
  }

  // Time & Salary
  h += '<div style="text-align:center;margin-top:20px;">';
  if (r.timeToHire) h += '<p style="font-size:13px;color:#888;">⏱️ Est. time to job-ready: <strong style="color:var(--white);">' + r.timeToHire + '</strong></p>';
  if (r.salaryRange) h += '<p style="font-size:13px;color:#888;">💰 Est. salary: <strong style="color:var(--green);">' + r.salaryRange + '</strong></p>';
  h += '</div>';

  // Actions
  h += '<div style="text-align:center;margin-top:24px;">';
  h += '<button class="btn btn-p" id="resumeAction">📝 Analyze Resume</button> ';
  h += '<button class="btn btn-o" id="retakeAction">🔄 New Assessment</button>';
  h += '</div>';

  if (r.finalAdvice) h += '<div class="card" style="margin-top:20px;text-align:center;"><p style="color:var(--green);font-style:italic;">💡 ' + r.finalAdvice + '</p></div>';
  h += '</div></div>';
  root.innerHTML = h;

  document.getElementById('logoutBtn2').addEventListener('click', function(){ localStorage.removeItem('ss_user'); S.user = null; S.token = null; S.view = 'landing'; render(); });
  document.getElementById('resumeAction').addEventListener('click', function(){ S.view = 'resume'; render(); });
  document.getElementById('retakeAction').addEventListener('click', function(){ S.assessment = null; S.answers = {}; S.view = 'home'; render(); });
}

// ── RESUME ──
function showResume(root){
  if (!S.user) { S.view = 'landing'; render(); return; }
  var h = '';
  h += '<header class="topbar"><div class="top-l">🎯 Skill <span class="grad">Sprint</span></div>';
  h += '<span style="font-size:13px;">' + S.user.name + '</span>';
  h += '<button class="btn btn-o btn-sm" id="backHome">← Dashboard</button></header>';
  h += '<div class="section"><div class="card fade-in">';
  h += '<h3>📝 Resume Analyzer & Optimizer</h3>';
  h += '<p style="font-size:13px;color:#888;margin-bottom:16px;">Paste your resume and AI will analyze it for gaps, ATS compatibility, and provide an optimized version.</p>';
  h += '<label>Target Job Role</label>';
  h += '<input id="resRole" class="input" list="rolesList2" placeholder="Type any role (e.g., Backend Developer, Data Analyst)" value="' + (S.jobRole || '') + '">';
  h += '<datalist id="rolesList2">';
  ROLES.forEach(function(r){ h += '<option value="' + r + '">'; });
  h += '</datalist>';
  h += '<label>Your Resume</label><textarea id="resText" class="input" rows="8" placeholder="Paste your full resume here..." style="resize:vertical;font-family:monospace;font-size:12px;"></textarea>';
  h += '<button class="btn btn-p" style="width:100%;" id="analyzeBtn">🤖 Analyze Resume</button>';
  h += '<div id="resResult"></div>';
  h += '</div></div>';
  root.innerHTML = h;

  document.getElementById('backHome').addEventListener('click', function(){ S.view = 'home'; render(); });
  document.getElementById('analyzeBtn').addEventListener('click', analyzeResume);
}

async function analyzeResume(){
  var text = $('resText').value;
  var role = $('resRole').value;
  if (text.length < 50) { toast('Paste at least 50 characters of your resume', false); return; }
  var btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '⏳ Analyzing...';
  try {
    var r = await api('POST', '/api/resume/analyze', { resumeText: text, jobRole: role });
    var a = r.analysis;
    var html = '<div class="card fade-in" style="margin-top:16px;">';
    html += '<h3>📊 Score: ' + a.overallScore + '/100 (ATS: ' + a.atsScore + '/100)</h3>';
    html += '<p style="font-size:13px;color:#888;">' + (a.summary || '') + '</p>';
    html += '<h4 style="color:var(--green);margin-top:12px;">✅ Strengths</h4>';
    (a.strengths || []).forEach(function(s){ html += '<p style="font-size:12px;color:var(--green);">• ' + s + '</p>'; });
    html += '<h4 style="color:#fca311;margin-top:12px;">⚠️ Gaps</h4>';
    (a.gaps || []).forEach(function(g){ html += '<p style="font-size:12px;color:#fca311;">• <strong>' + g.section + '</strong>: ' + g.issue + ' → ' + g.suggestion + '</p>'; });
    if (a.keywords && a.keywords.length) html += '<h4 style="color:var(--blue);margin-top:12px;">🔑 Missing Keywords</h4><p style="font-size:12px;color:#888;">' + a.keywords.join(', ') + '</p>';
    if (a.optimizedResume) html += '<h4 style="color:var(--green);margin-top:12px;">✨ Optimized Resume</h4><textarea class="input" rows="8" style="font-family:monospace;font-size:11px;resize:vertical;">' + a.optimizedResume.replace(/</g, '&lt;') + '</textarea>';
    html += '</div>';
    $('resResult').innerHTML = html;
  } catch(e) { toast(e.message, false); }
  btn.disabled = false; btn.textContent = '🤖 Analyze Resume';
}

// ── COURSES ──
function showCourses(root){
  if (!S.user) { S.view = 'landing'; render(); return; }
  var h = '';
  h += '<header class="topbar"><div class="top-l">🎯 Skill <span class="grad">Sprint</span></div>';
  h += '<span style="font-size:13px;">' + S.user.name + '</span>';
  h += '<button class="btn btn-o btn-sm" id="backHome2">← Dashboard</button></header>';
  h += '<div class="section"><div class="card fade-in"><h3>📚 Courses for ' + S.jobRole + '</h3><div id="coursesList"><p style="color:#888;">Loading...</p></div></div></div>';
  root.innerHTML = h;
  document.getElementById('backHome2').addEventListener('click', function(){ S.view = 'home'; render(); });
  loadCourses();
}

async function loadCourses(){
  try {
    var r = await api('GET', '/api/courses/' + encodeURIComponent(S.jobRole));
    var html = '<h4 style="color:var(--green);">🆓 Free (' + r.freeCourses.length + ' shown)</h4>';
    r.freeCourses.forEach(function(c){ html += '<p style="font-size:13px;margin-bottom:6px;">• <strong>' + c.name + '</strong> — ' + c.platform + ' (' + c.level + ')</p>'; });
    if (r.paidCourses && r.paidCourses.length) {
      html += '<h4 style="color:var(--blue);margin-top:16px;">💎 Premium</h4>';
      r.paidCourses.forEach(function(c){ html += '<p style="font-size:13px;margin-bottom:6px;">• <strong>' + c.name + '</strong> — ' + c.platform + '</p>'; });
    }
    if (!r.isPaid) html += '<div class="card" style="margin-top:16px;text-align:center;border-color:rgba(67,97,238,.3);"><p style="color:var(--blue);">💎 Upgrade to Pro for unlimited access</p></div>';
    $('coursesList').innerHTML = html;
  } catch(e) { $('coursesList').innerHTML = '<p style="color:var(--red);">Failed to load courses.</p>'; }
}

// ── AI MENTOR ──
function toggleAI(){
  var p = document.getElementById('aiPanel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) document.getElementById('aiInput').focus();
}

async function sendAI(){
  var inp = document.getElementById('aiInput');
  var msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  var body = document.getElementById('aiBody');
  body.innerHTML += '<div class="ai-msg ai-user">' + msg.replace(/</g, '&lt;') + '</div>';
  body.innerHTML += '<div id="typing" style="color:var(--blue);font-size:11px;padding:4px;">Thinking...</div>';
  body.scrollTop = body.scrollHeight;
  try {
    var r = await api('POST', '/api/mentor/chat', { message: msg, chatHistory: MENTOR_HIST });
    var t = document.getElementById('typing');
    if (t) t.remove();
    MENTOR_HIST.push({ role: 'user', content: msg }, { role: 'assistant', content: r.response });
    if (MENTOR_HIST.length > 10) MENTOR_HIST = MENTOR_HIST.slice(-10);
    body.innerHTML += '<div class="ai-msg ai-bot">' + r.response.replace(/</g, '&lt;') + '</div>';
  } catch(e) {
    var t = document.getElementById('typing');
    if (t) t.remove();
    body.innerHTML += '<div class="ai-msg ai-bot" style="color:var(--red);">Error: ' + e.message + '</div>';
  }
  body.scrollTop = body.scrollHeight;
}

// ── INIT ──
function initApp(){
  console.log('Skill Sprint initializing...');
  try {
    var saved = localStorage.getItem('ss_user');
    if (saved) {
      var d = JSON.parse(saved);
      S.user = d.user;
      S.token = d.token;
      S.view = 'home';
      console.log('Session restored for', S.user.name);
    }
  } catch(e) { console.log('No saved session'); }

  // Email verification from URL
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (token) {
    api('GET', '/api/auth/verify?token=' + encodeURIComponent(token))
      .then(function(){ toast('Email verified! You can log in now.', true); window.history.replaceState({}, '', '/'); })
      .catch(function(e){ toast(e.message, false); });
  }

  render();
  console.log('Render complete. View:', S.view);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
</body>
